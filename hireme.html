<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FABXCOP | Hire Me</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}



body{

background:#05070d;

color:white;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:50px;

overflow-x:hidden;

}

/* Animated Background */

body::before{

content:"";

position:fixed;

inset:0;

background:
radial-gradient(circle at 20% 20%,rgba(0,229,255,.15),transparent 30%),
radial-gradient(circle at 80% 80%,rgba(138,92,246,.15),transparent 30%),
radial-gradient(circle at 60% 30%,rgba(255,0,255,.1),transparent 30%);

animation:bgMove 15s linear infinite;

z-index:-2;

}

@keyframes bgMove{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-30px);

}

100%{

transform:translateY(0);

}

}

/* Container */

.container{

width:100%;

max-width:900px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

border-radius:25px;

padding:50px;

box-shadow:

0 0 40px rgba(0,229,255,.2);

}

/* Title */

h1{

font-family:Orbitron;

font-size:55px;

text-align:center;

color:#00e5ff;

text-shadow:

0 0 20px cyan,

0 0 50px cyan;

}

.subtitle{

text-align:center;

margin-top:15px;

color:#cfcfcf;

margin-bottom:50px;

}

/* Form */

form{

display:grid;

gap:22px;

}

input,
select,
textarea{

width:100%;

padding:18px;

background:rgba(255,255,255,.05);

border:2px solid rgba(255,255,255,.1);

border-radius:14px;

color:white;

font-size:17px;

outline:none;

transition:.35s;

}

input:focus,
select:focus,
textarea:focus{

border-color:#00e5ff;

box-shadow:

0 0 15px cyan;

}

textarea{

height:170px;

resize:none;

}

button{

padding:18px;

font-size:18px;

font-weight:bold;

border:none;

border-radius:14px;

cursor:pointer;

background:linear-gradient(90deg,#00e5ff,#7b5cff);

color:white;

transition:.35s;

}

button:hover{

transform:translateY(-5px);

box-shadow:

0 0 20px cyan,

0 0 50px cyan;

}

/* Back Button */

.back{

display:inline-flex;

align-items:center;

gap:10px;

margin-bottom:30px;

text-decoration:none;

color:white;

font-size:18px;

transition:.3s;

}

.back:hover{

color:#00e5ff;

}

::placeholder{

color:#bdbdbd;

}

option{

background:#111;

}

/* Responsive */

@media(max-width:700px){

.container{

padding:30px;

}

h1{

font-size:38px;

}

body{

padding:20px;

}

}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="back">

<i class="fa-solid fa-arrow-left"></i>

Back To Portfolio

</a>

<h1>Hire FABXCOP</h1>

<p class="subtitle">

Fill out the form below and I'll contact you as soon as possible.

</p>

<form action="https://formspree.io/f/mlgyable" method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="text"
name="company"
placeholder="Company Name (Optional)">

<select
name="project"
required>

<option value="">Project Type</option>

<option>Website</option>

<option>Java Desktop Application</option>

<option>Discord Bot</option>

<option>Automation Tool</option>

<option>Bug Fix</option>

<option>Other</option>

</select>

<input
type="text"
name="budget"
placeholder="Estimated Budget">

<input
type="date"
name="deadline">

<textarea
name="description"
placeholder="Describe your project..."
required></textarea>

<button type="submit" id="sendBtn">

<i class="fa-solid fa-paper-plane"></i>

Send Application

</button>

</form>

</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init({
    publicKey:"1xwDnfaskHrpIIWcw"
});

</script>

<script>

const form=document.getElementById("hireForm");
const btn=document.getElementById("sendBtn");

form.addEventListener("submit",function(e){

e.preventDefault();

btn.innerHTML="⏳ Sending...";
btn.disabled=true;

emailjs.sendForm(

"service_ys4ld7d",

"template_0t800bc",

this

).then(()=>{

btn.innerHTML="✅ Application Sent";

alert("Thank you!\n\nYour application has been sent successfully.\n\nI'll contact you soon.");

form.reset();

btn.innerHTML="🚀 Send Application";

btn.disabled=false;

}).catch((error)=>{

console.log(error);

btn.innerHTML="❌ Failed";

alert("Something went wrong.\nPlease try again.");

btn.innerHTML="🚀 Send Application";

btn.disabled=false;

});

});

</script>


</body>
</html>
